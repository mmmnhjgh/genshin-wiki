<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>穗星数据库 - 管理界面</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div id="admin">
    <h1>穗星数据库 管理界面 v2.1</h1>

    <nav class="admin-nav">
      <button class="nav-btn active" data-tab="characters">角色</button>
      <button class="nav-btn" data-tab="weapons">武器</button>
      <button class="nav-btn" data-tab="commands">常用指令</button>
      <button class="nav-btn" data-tab="bosses">Boss</button>
      <button class="nav-btn" data-tab="scenes">场景</button>
    </nav>

    <div id="tab-characters" class="tab-content active"></div>
    <div id="tab-weapons" class="tab-content"></div>
    <div id="tab-commands" class="tab-content"></div>
    <div id="tab-bosses" class="tab-content"></div>
    <div id="tab-scenes" class="tab-content"></div>

    <div id="editModal" class="modal">
      <div class="modal-content">
        <h3 id="modalTitle">编辑</h3>
        <div id="modalFields"></div>
        <div class="modal-actions">
          <button class="btn-secondary" id="modalCancel">取消</button>
          <button class="btn-primary" id="modalSave">保存</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast"></div>
  </div>
  <script src="admin.js"></script>
</body>
</html>
